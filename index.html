<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Consulta de Ventas</title>

    <link rel="stylesheet" href="index.css">

    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

</head>

<body>

<header>

    <h1>📊 CONSULTA DE VENTAS</h1>

    <div class="ultima-actualizacion">
        <span>Última actualización:</span>
        <span id="ultimaActualizacion">Sin actualizar</span>
    </div>

</header>

<section class="contenedorCarga">

    <button id="btnExcel" class="btnExcel">
        📁 Cargar Excel
    </button>

    <input
        type="file"
        id="excel"
        accept=".xlsx,.xls"
        hidden>

    <div id="nombreArchivo" class="archivo">
        Sin archivo
    </div>

</section>


<section class="filtros">

    <div class="grupoFiltro">

        <label>Fecha</label>

        <select id="filtroFecha">

            <option value="TODOS">
                Todas las fechas
            </option>

        </select>

    </div>

    <div class="grupoFiltro">

        <label>Asesor</label>

        <select id="filtroAsesor">

            <option value="TODOS">
                Todos
            </option>

        </select>

    </div>

    <div class="grupoFiltro">

        <label>Tipo Venta</label>

        <select id="filtroTipo">

            <option value="TODOS">
                Todos
            </option>

            <option value="MIGRACION">
                Migración
            </option>

            <option value="UP GRADE MOVIL">
                Upgrade Móvil
            </option>

            <option value="UP GRADE HOGAR">
                Upgrade Hogar
            </option>

        </select>

    </div>

</section>


<section class="tablaContainer">

<table>

<thead>

<tr>

<th>Fecha</th>
<th>Asesor</th>
<th>Cliente</th>
<th>Tipo Venta</th>
<th>Diferencia</th>
<th>Estado Crédito</th>

</tr>

</thead>

<tbody id="tablaVentas">

</tbody>

</table>

</section>

<script src="index.js"></script>

</body>

</html>
